        (function(window, app_config, app_config_url) {

            /**
             * Universal Plugin launcher.
             * @param {object} window - window object
             * @param {object} app_config - launcher options
             * @param {string}  app_config_url -  url to obtain app_config if that wasn't provided
             * @returns {undefined}
             */
            function PluginLauncher(window, app_config, app_config_url) {
                this.window = window;
                this.app_config = app_config;
                this.app_config_url = app_config_url;
                this.app_started = false;
                this.init();
            }

            /**
             * This method is called from constructor and may be overwritten.
             * @returns {undefined}
             */
            PluginLauncher.prototype.init = function() {}

            /**
             * This method is called when plugin is loaded and may be overwritten.
             * @returns {undefined}
             */
            PluginLauncher.prototype.onLoad = function() {}

            /**
             * This method is called when plugin cannot be loaded and may be overwritten.
             * @returns {undefined}
             */
            PluginLauncher.prototype.onLoadError = function() {}

            /**
             * This method should check if CDN may be used.
             * @returns {boolean}
             */
            PluginLauncher.prototype.usesCDN = function() {
                throw new Error('Method not implemented');
            }

            /**
             * This method should replace all urls in this.app_config with domain provided.
             * @returns {undefined}
             */
            PluginLauncher.prototype.replaceDomainInConfig = function(domain) {
                throw new Error('Method not implemented');
            }

            /**
             * This method should return the url to the start script
             * @returns {string}
             */
            PluginLauncher.prototype.getStartScript = function() {
                throw new Error('Method not implemented');
            }

            /**
             * This method may be used to replace domain in url
             * @param {string} url - original url
             * @param {string} domain - new domain
             * @returns {string}
             */
            PluginLauncher.prototype.replaceDomainInURL = function(url, domain) {
                if (!url || !domain) return url;
                if (domain[domain.length - 1] !== '/') {
                    domain += '/';
                }
                return url.replace(/^([^/]*\/\/[^/]*)?\/?/, domain);
            }

            /**
             * Run the plugin according to provided config/config_url.
             */
            PluginLauncher.prototype.run = function() {
                if (this.app_config) {
                    var force_domain = this.app_config.static_domains.force_domain;
                    if (!this.usesCDN()) {
                        this._runOnDomain();
                    } else if (force_domain) {
                        this._runOnDomain('//' + force_domain);
                    } else {
                        this._runOnBestCDN();
                    }
                } else {
                    var self = this;
                    xhr(this.app_config_url + this.window.location.search, {
                        success: function(resp) {
                            self.app_config = JSON.parse(resp);
                            self.run();
                        },
                        error: function(xhr) {
                            if (xhr.responseText) document.write(xhr.responseText);
                        }
                    });
                }
            }

            PluginLauncher.prototype._runOnDomain = function(domain) {
                if (this.app_started) return;
                this.app_started = true;

                if (domain) {
                    this.replaceDomainInConfig(domain);
                    this.app_config.static_domain = domain;
                }

                if (
                    this.app_config.static_domain &&
                    this.app_config.static_domain.startsWith('//')
                ) {
                    this.app_config.static_domain = this.app_config.static_domain.slice(2);
                }

                this.window._PROVIDER = this.app_config;

                var script = this.window.document.createElement('script'),
                    self = this;
                script.setAttribute('type', 'text/javascript');
                script.setAttribute('src', this.getStartScript());
                script.onload = function() {
                    self.onLoad();
                }
                script.onerror = function() {
                    self.onLoadError();
                }
                this.window.document.getElementsByTagName('head')[0].appendChild(script);
            }

            PluginLauncher.prototype._runOnBestCDN = function() {
                var self = this,
                    first_detected = false,
                    unchecked_domains = 0;

                function velocityDetect(domain) {
                    var start_time = (new Date()).getTime();
                    xhr(domain + self.app_config.static_domains.metric_url, {
                        method: 'HEAD',
                        success: function() {
                            unchecked_domains -= 1;
                            var duration = (new Date()).getTime() - start_time;
                            if (!first_detected) {
                                first_detected = true;
                                self._runOnDomain(domain);
                                self._logMessage('info', 'CDN_METER_FIRST', domain, duration);
                            } else {
                                self._logMessage('info', 'CDN_METER', domain, duration);
                            }
                        },
                        error: function() {
                            unchecked_domains -= 1;
                            if (!first_detected && unchecked_domains === 0) {
                                self._runOnDomain();
                            }
                            self._logMessage('error', 'CDN_METER_ERROR', domain);
                        }
                    });
                }

                xhr(this.app_config.static_domains.domains_url, {
                    success: function(resp) {
                        var static_domains = JSON.parse(resp).domains || [];

                        unchecked_domains = static_domains.length;
                        if (!unchecked_domains) {
                            return self._runOnDomain();
                        }
                        setTimeout(function() {
                            self._runOnDomain();
                        }, self.app_config.static_domains.timeout);
                        var i = 0;
                        while (static_domains[i]) {
                            velocityDetect(static_domains[i]);
                            i++;
                        }
                    }
                });
            }

            PluginLauncher.prototype._logMessage = function(type, msg, data, number) {
                if (!this.app_config.static_domains.log_url) return;
                xhr(this.app_config.static_domains.log_url, {
                    method: 'POST',
                    data: JSON.stringify([{
                        type: type,
                        msg: msg,
                        data: data,
                        time: Number(new Date()),
                        number: number
                    }])
                });
            }

            PluginLauncher.extend = function(obj) {
                function Child() {
                    PluginLauncher.apply(this, arguments);
                }
                Child.prototype = Object.create(PluginLauncher.prototype);
                Child.prototype.constructor = Child;

                for (var attr in obj) {
                    if (obj.hasOwnProperty(attr)) Child.prototype[attr] = obj[attr];
                }
                return Child;
            };

            function xhr(url, options) {
                options = options || {};
                var xhr = new window.XMLHttpRequest();
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            options.success && options.success(xhr.responseText, xhr);
                        } else {
                            options.error && options.error(xhr);
                        }
                    }
                };
                xhr.open(options.method || 'GET', url, true);
                xhr.send(options.data || '');
            }
            var GameLauncher = PluginLauncher.extend({
                usesCDN: function() {
                    return this.app_config.desktop.use_cdn ||
                        this.app_config.mobile.use_cdn ||
                        this.app_config.gr.use_cdn ||
                        this.app_config.promo_widget.use_cdn;
                },
                replaceDomainInConfig: function(domain) {
                    if (this.app_config.desktop.use_cdn) {
                        this.app_config.desktop.client_url = this.replaceDomainInURL(
                            this.app_config.desktop.client_url, domain
                        );
                    }
                    if (this.app_config.mobile.use_cdn) {
                        this.app_config.mobile.client_url = this.replaceDomainInURL(
                            this.app_config.mobile.client_url, domain
                        );
                    }
                    if (this.app_config.gr.use_cdn) {
                        this.app_config.gr.static_path = this.replaceDomainInURL(
                            this.app_config.gr.static_path, domain
                        );
                    }
                    if (this.app_config.promo_widget.use_cdn) {
                        this.app_config.promo_widget.static_path =
                            this.replaceDomainInURL(
                                this.app_config.promo_widget.static_path, domain
                            );
                    }
                    if (this.app_config.available_games.length != null) {
                        for (var i in this.app_config.available_games) {
                            var game = this.app_config.available_games[i];
                            game.client_url = this.replaceDomainInURL(
                                game.client_url, domain
                            );
                        }
                    }
                },
                getStartScript: function() {
                    return this.app_config.gr.static_path + 'index.js' +
                        '?_ts=' + this.app_config.gr.revision;
                }
            });

            var launcher = new GameLauncher(window, app_config, app_config_url);
            launcher.run();
